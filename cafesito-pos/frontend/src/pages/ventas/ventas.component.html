<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <!-- IZQUIERDA: Productos -->
  <section class="lg:col-span-2">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold text-zinc-100">Ventas</h1>
      <span class="text-sm text-zinc-400">Venta activa</span>
    </div>

    <div class="mt-4">
      <input class="w-full rounded-xl bg-zinc-900 border border-zinc-800 px-4 py-3 text-zinc-100 placeholder:text-zinc-500"
             placeholder="Buscar producto por nombre..." />
    </div>

    <div class="mt-4 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
      <div class="grid grid-cols-12 px-4 py-3 text-xs text-zinc-400 border-b border-zinc-800">
        <div class="col-span-6">Producto</div>
        <div class="col-span-2 text-right">Precio</div>
        <div class="col-span-2 text-right">Stock</div>
        <div class="col-span-2 text-right">Acción</div>
      </div>

      <!-- fila -->
      <div class="grid grid-cols-12 px-4 py-3 items-center border-b border-zinc-800">
        <div class="col-span-6 text-zinc-100">Café Americano</div>
        <div class="col-span-2 text-right text-zinc-200">$35.00</div>
        <div class="col-span-2 text-right text-emerald-400">12</div>
        <div class="col-span-2 text-right">
          <button class="px-3 py-1 rounded-lg bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold text-sm">
            +
          </button>
        </div>
      </div>

      <!-- fila stock bajo -->
      <div class="grid grid-cols-12 px-4 py-3 items-center">
        <div class="col-span-6 text-zinc-100">Capuccino</div>
        <div class="col-span-2 text-right text-zinc-200">$45.00</div>
        <div class="col-span-2 text-right text-orange-400">3</div>
        <div class="col-span-2 text-right">
          <button class="px-3 py-1 rounded-lg bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold text-sm">
            +
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- DERECHA: Carrito -->
  <aside class="lg:col-span-1">
    <div class="sticky top-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
      <h2 class="text-lg font-semibold text-zinc-100">Venta actual</h2>

      <div class="mt-4 space-y-3">
        <div class="flex justify-between">
          <div>
            <p class="text-zinc-100">Café Americano</p>
            <p class="text-xs text-zinc-400">2 x $35</p>
          </div>
          <div class="text-right">
            <p class="text-zinc-100">$70</p>
            <div class="mt-1 flex gap-2 justify-end">
              <button class="w-7 h-7 rounded-lg bg-zinc-950 border border-zinc-800 text-zinc-200">-</button>
              <button class="w-7 h-7 rounded-lg bg-zinc-950 border border-zinc-800 text-zinc-200">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-6 border-t border-zinc-800 pt-4 space-y-2">
        <div class="flex justify-between text-zinc-300">
          <span>Subtotal</span><span>$70.00</span>
        </div>
        <div class="flex justify-between text-zinc-300">
          <span>Descuento</span><span>$0.00</span>
        </div>
        <div class="flex justify-between text-zinc-100 font-bold text-xl">
          <span>Total</span><span class="text-amber-400">$70.00</span>
        </div>

        <button class="w-full mt-3 rounded-xl bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold py-3">
          Cobrar
        </button>

        <button class="w-full rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-200 font-semibold py-3">
          Cancelar
        </button>
      </div>
    </div>
  </aside>
</div>
