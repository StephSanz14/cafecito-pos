<div class="min-h-screen bg-zinc-950 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
    <h1 class="text-2xl font-bold text-amber-400">Crear cuenta</h1>
    <p class="text-zinc-400 mt-1">Registro de vendedor</p>

    <form class="mt-6 space-y-4">
      <div>
        <label class="text-sm text-zinc-300">Nombre</label>
        <input
          class="mt-1 w-full rounded-xl bg-zinc-950 border border-zinc-800 px-4 py-3 text-zinc-100"
          placeholder="Nombre completo"
        />
      </div>

      <div>
        <label class="text-sm text-zinc-300">Teléfono o correo</label>
        <input
          class="mt-1 w-full rounded-xl bg-zinc-950 border border-zinc-800 px-4 py-3 text-zinc-100"
          placeholder="4491234567 o correo@mail.com"
        />
      </div>

      <div>
        <label class="text-sm text-zinc-300">Contraseña</label>
        <input
          type="password"
          class="mt-1 w-full rounded-xl bg-zinc-950 border border-zinc-800 px-4 py-3 text-zinc-100"
          placeholder="••••••••"
        />
      </div>

      <button
        class="w-full rounded-xl bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold py-3">
        Registrarme
      </button>

      <p class="text-sm text-zinc-500 text-center">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-amber-400 hover:underline">
          Inicia sesión
        </a>
      </p>
    </form>
  </div>
</div>
