<div class="flex items-center justify-between">
  <h1 class="text-2xl font-bold text-zinc-100">Productos</h1>
  <button class="rounded-xl bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold px-4 py-2">
    + Nuevo producto
  </button>
</div>

<div class="mt-4">
  <input class="w-full rounded-xl bg-zinc-900 border border-zinc-800 px-4 py-3 text-zinc-100"
         placeholder="Buscar producto..." />
</div>

<div class="mt-4 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
  <div class="grid grid-cols-12 px-4 py-3 text-xs text-zinc-400 border-b border-zinc-800">
    <div class="col-span-6">Nombre</div>
    <div class="col-span-2 text-right">Precio</div>
    <div class="col-span-2 text-right">Stock</div>
    <div class="col-span-2 text-right">Acciones</div>
  </div>

  <div class="grid grid-cols-12 px-4 py-3 items-center border-b border-zinc-800">
    <div class="col-span-6 text-zinc-100">Café Americano</div>
    <div class="col-span-2 text-right text-zinc-200">$35.00</div>
    <div class="col-span-2 text-right">
      <span class="px-2 py-1 text-xs rounded-full bg-emerald-500/10 text-emerald-400">OK</span>
    </div>
    <div class="col-span-2 text-right space-x-2">
      <button class="px-3 py-1 rounded-lg bg-zinc-950 border border-zinc-800 text-zinc-200 text-sm">Editar</button>
      <button class="px-3 py-1 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-300 text-sm">Eliminar</button>
    </div>
  </div>
</div>
